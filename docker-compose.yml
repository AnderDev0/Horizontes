version: '3.8'

services:
  horizontes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: horizontes-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.horizontes.rule=Host(`horizontesviajes.com.co`)"
      - "traefik.http.routers.horizontes.entrypoints=websecure"
      - "traefik.http.routers.horizontes.tls.certresolver=letsencrypt"
